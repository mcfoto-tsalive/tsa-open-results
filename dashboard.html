<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>TSA Open Championship 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{--bg:#123b5b;--panel:rgba(8,33,55,.80);--line:rgba(255,255,255,.24);--text:#f6fbff;--muted:#c9ddea;--accent:#55a9d9;--red:#ff3b30}
@font-face{font-family:"Future Edge";src:local("Future Edge"),local("FutureEdge")}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at top left,#1a5379 0,#123b5b 34%,#09273f 100%);color:var(--text);font-family:"Future Edge","Arial Black",Impact,system-ui,sans-serif;overflow:hidden}
#app{width:100vw;height:100vh;padding:3.2vh 4.1vw 2.8vh;display:flex;flex-direction:column}
header{display:grid;grid-template-columns:250px 1fr 220px;gap:22px;align-items:start;margin-bottom:.8vh}
.logo{max-width:250px;max-height:176px;object-fit:contain}
.title{font-size:3.85vw;line-height:1.02;letter-spacing:.08em;text-transform:uppercase;font-weight:900;text-align:center}
.meta{font-family:Arial,sans-serif;text-align:right;color:var(--muted);font-size:1.15vw;line-height:1.35;padding-top:1.2vh}
.screen-title{text-align:center;font-size:2.65vw;letter-spacing:.10em;text-transform:uppercase;margin:.3vh 0 1.5vh;font-weight:900}
.panel{border:2px solid var(--line);border-radius:22px;background:var(--panel);padding:1.7vh 2vw;flex:1;min-height:0;overflow:hidden}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{color:var(--muted);font-size:1.35vw;letter-spacing:.08em;text-align:left;padding:.65vh .55vw 1vh;border-bottom:2px solid var(--line);text-transform:uppercase;white-space:nowrap}
td{font-family:Arial,Helvetica,sans-serif;font-weight:850;font-size:1.55vw;padding:.64vh .55vw;border-bottom:1px solid rgba(255,255,255,.09);vertical-align:middle}
td.score{font-size:1.88vw;font-weight:900}
.rank{width:7%;color:var(--accent);text-align:center;font-size:1.9vw!important;font-weight:900}
.name{width:34%;font-size:1.78vw}
.grade{width:8%;color:var(--muted);text-align:center}
.score{text-align:right;font-variant-numeric:tabular-nums}
.total{color:#fff}.perfect{color:var(--red)!important;text-shadow:0 0 8px rgba(255,59,48,.18)}
.grade-table col.rank-col{width:7%}.grade-table col.name-col{width:37%}.grade-table col.card-col{width:13%}.grade-table col.total-col{width:17%}
.full-table col.rank-col{width:6%}.full-table col.name-col{width:25%}.full-table col.grade-col{width:7%}.full-table col.card-col{width:11%}.full-table col.total-col{width:12%}.full-table col.open-col{width:13%}.full-table col.aggregate-col{width:15%}
.leaders-list{height:100%;display:flex;flex-direction:column;justify-content:center;gap:1.15vh}
.leader-row{display:grid;grid-template-columns:28% 1fr 18%;align-items:center;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.045);padding:1.05vh 1.5vw}
.leader-label{color:var(--accent);font-size:1.65vw;letter-spacing:.07em;text-transform:uppercase}
.leader-name{font-family:Arial,Helvetica,sans-serif;font-size:1.9vw;font-weight:900}
.leader-score{font-family:Arial,Helvetica,sans-serif;font-size:2.1vw;font-weight:950;text-align:right;font-variant-numeric:tabular-nums}
.empty{font-family:Arial,sans-serif;text-align:center;font-size:2vw;color:var(--muted);margin-top:12vh}
.controls{position:fixed;left:18px;bottom:18px;display:flex;gap:8px;background:rgba(0,0,0,.72);padding:10px;border-radius:10px;z-index:10}
button,label.filebutton{font:700 14px Arial,sans-serif;color:#123b5b;background:#fff;border:0;border-radius:7px;padding:10px 12px;cursor:pointer}
input[type=file]{display:none}.hidden{display:none!important}
tr:nth-child(1) .rank{color:#ffd700} tr:nth-child(2) .rank{color:#d8d8d8} tr:nth-child(3) .rank{color:#cd7f32}
</style>
</head>
<body>
<div id="app"><header><img class="logo" src="tsa_logo.jpg" onerror="this.style.display='none'"><div class="title">TSA Open Championship<br>2026</div><div class="meta"><div id="now"></div><div id="updated">No scores loaded</div></div></header><div id="screen"></div></div>
<div class="controls" id="controls"><label class="filebutton">Load scores.csv<input id="file" type="file" accept=".csv,text/csv"></label><button id="prev">Prev</button><button id="next">Next</button><button id="full">Start Full Screen</button><button id="hide">Hide Buttons</button></div>
<script>
const ROTATE_MS=15000, ROWS_PER_PAGE=10, VALID_GRADES=["Master","A","B","C","D"];
const gradeLabels={"Master":"Master Grade","A":"A Grade","B":"B Grade","C":"C Grade","D":"D Grade"};
let competitors=[],screens=[],idx=0,timer=null;
function norm(s){return String(s??"").trim()} function key(s){return norm(s).toLowerCase().replace(/[^a-z0-9]/g,"")}
function pick(row,names){const wanted=names.map(key);for(const k in row){if(wanted.includes(key(k)))return row[k]}return""}
function num(v){const n=parseFloat(String(v??"").replace(/[^0-9.\-]/g,""));return Number.isFinite(n)?n:0}
function isHundred(s){return Math.round(num(s))===100}
function fmtPlain(s,x){s=Math.round(num(s));x=Math.round(num(x));return `${s}.${String(x).padStart(2,"0")}`}
function fmtCard(s,x){const t=fmtPlain(s,x);return isHundred(s)?`<span class="perfect">${t}</span>`:t}
function fmtTotal300(c){const t=fmtPlain(c.total300s,c.total300x);return (isHundred(c.c1s)&&isHundred(c.c2s)&&isHundred(c.c3s))?`<span class="perfect">${t}</span>`:t}
function fmtOpen(c){
  const t=fmtPlain(c.os,c.ox);
  if(isHundred(c.open1s) && isHundred(c.open2s)) return `<span class="perfect">${t}</span>`;
  if(isHundred(c.open1s) || isHundred(c.open2s)){
    const first = Math.floor(c.os/100);
    const rest = String(Math.round(c.os)).slice(1) + "." + String(Math.round(c.ox)).padStart(2,"0");
    return `<span class="perfect">${first}</span>${rest}`;
  }
  return t;
}
function fmtOverall(c){const t=fmtPlain(c.overallS,c.overallX);return (Math.round(num(c.overallS))>=500)?`<span class="perfect">${t}</span>`:t}
function parseCSV(text){const rows=[];let row=[],field="",q=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(q){if(c=='"'&&n=='"'){field+='"';i++}else if(c=='"'){q=false}else field+=c}else{if(c=='"')q=true;else if(c==','){row.push(field);field=""}else if(c=='\n'){row.push(field);rows.push(row);row=[];field=""}else if(c!='\r')field+=c}}row.push(field);rows.push(row);const headers=rows.shift().map(h=>norm(h));return rows.map(r=>{const o={};headers.forEach((h,i)=>o[h]=r[i]??"");return o})}
function buildCompetitors(rows){return rows.map(row=>{
 const name=norm(pick(row,["Name","Competitor","Shooter","Full Name"]));const gradeRaw=norm(pick(row,["Grade","Class"]));const grade=VALID_GRADES.find(g=>g.toLowerCase()===gradeRaw.toLowerCase())||"";
 const c1s=num(pick(row,["Card1 Score","Card 1 Score","C1 Score","Card1","Card 1","C1"]));const c1x=num(pick(row,["Card1 Centres","Card 1 Centres","C1 Centres","Card1 X","Card 1 X","C1 X"]));
 const c2s=num(pick(row,["Card2 Score","Card 2 Score","C2 Score","Card2","Card 2","C2"]));const c2x=num(pick(row,["Card2 Centres","Card 2 Centres","C2 Centres","Card2 X","Card 2 X","C2 X"]));
 const c3s=num(pick(row,["Card3 Score","Card 3 Score","C3 Score","Card3","Card 3","C3"]));const c3x=num(pick(row,["Card3 Centres","Card 3 Centres","C3 Centres","Card3 X","Card 3 X","C3 X"]));
 const open1s=num(pick(row,["Open Card 1 Score","Open1 Score","Open 1 Score","Open Card1 Score"])); const open1x=num(pick(row,["Open Card 1 Centres","Open1 Centres","Open 1 Centres","Open Card1 Centres","Open1 X","Open 1 X"]));
 const open2s=num(pick(row,["Open Card 2 Score","Open2 Score","Open 2 Score","Open Card2 Score"])); const open2x=num(pick(row,["Open Card 2 Centres","Open2 Centres","Open 2 Centres","Open Card2 Centres","Open2 X","Open 2 X"]));
 const os=num(pick(row,["Open Score","Open","Open 200 Score","200 Score"])) || (open1s+open2s); const ox=num(pick(row,["Open Centres","Open X","Open 200 Centres","200 Centres"])) || (open1x+open2x);
 const total300s=num(pick(row,["300 Score","300.30 Score","300 Match Score"]))||(c1s+c2s+c3s); const total300x=num(pick(row,["300 Centres","300.30 Centres","300 Match Centres"]))||(c1x+c2x+c3x);
 const overallS=num(pick(row,["Overall Score","Aggregate Score","500 Score","500.50 Score"]))||(total300s+os); const overallX=num(pick(row,["Overall Centres","Aggregate Centres","500 Centres","500.50 Centres"]))||(total300x+ox);
 return{name,grade,c1s,c1x,c2s,c2x,c3s,c3x,open1s,open1x,open2s,open2x,os,ox,total300s,total300x,overallS,overallX}
 }).filter(c=>c.name&&c.grade)}
function sortBy(items,s,x){return[...items].sort((a,b)=>(b[s]-a[s])||(b[x]-a[x])||a.name.localeCompare(b.name))}
function paginate(title,items,type){let pages=[];for(let i=0;i<items.length;i+=ROWS_PER_PAGE)pages.push({title,items:items.slice(i,i+ROWS_PER_PAGE),offset:i,type,page:Math.floor(i/ROWS_PER_PAGE)+1,pages:Math.ceil(items.length/ROWS_PER_PAGE)});return pages}
function buildScreens(){const all=competitors,s=[];s.push({title:"Current Leaders",type:"leaders",items:[]});for(const g of VALID_GRADES){const items=sortBy(all.filter(c=>c.grade===g),"total300s","total300x");if(items.length)s.push(...paginate(gradeLabels[g],items,"grade"))}const open=sortBy(all,"os","ox").filter(c=>c.os||c.ox);if(open.length)s.push(...paginate("Open Competition",open,"open"));const overall=sortBy(all,"overallS","overallX").filter(c=>c.overallS||c.overallX);if(overall.length)s.push(...paginate("Overall Aggregate",overall,"overall"));screens=s.length?s:[{title:"No competitors loaded",type:"empty",items:[]}];idx=0}
function escapeHTML(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
function tableHTML(screen){const title=screen.pages>1?`${screen.title} — Page ${screen.page} of ${screen.pages}`:screen.title;let heads,cols;
 if(screen.type==="grade"){cols=`<colgroup><col class="rank-col"><col class="name-col"><col class="card-col"><col class="card-col"><col class="card-col"><col class="total-col"></colgroup>`;heads=`<tr><th class="rank">Rank</th><th class="name">Competitor</th><th class="score">Card 1</th><th class="score">Card 2</th><th class="score">Card 3</th><th class="score">300.30</th></tr>`}
 else{cols=`<colgroup><col class="rank-col"><col class="name-col"><col class="grade-col"><col class="card-col"><col class="card-col"><col class="card-col"><col class="total-col"><col class="open-col">${screen.type==="overall"?'<col class="aggregate-col">':""}</colgroup>`;heads=`<tr><th class="rank">Rank</th><th class="name">Competitor</th><th class="grade">Grade</th><th class="score">Card 1</th><th class="score">Card 2</th><th class="score">Card 3</th><th class="score">300.30</th><th class="score">Open 200.20</th>${screen.type==="overall"?'<th class="score">500.50</th>':""}</tr>`}
 const rows=screen.items.map((c,i)=>{const rank=screen.offset+i+1;if(screen.type==="grade")return`<tr><td class="rank">${rank}</td><td class="name">${escapeHTML(c.name)}</td><td class="score">${fmtCard(c.c1s,c.c1x)}</td><td class="score">${fmtCard(c.c2s,c.c2x)}</td><td class="score">${fmtCard(c.c3s,c.c3x)}</td><td class="score total">${fmtTotal300(c)}</td></tr>`;
 return`<tr><td class="rank">${rank}</td><td class="name">${escapeHTML(c.name)}</td><td class="grade">${escapeHTML(c.grade)}</td><td class="score">${fmtCard(c.c1s,c.c1x)}</td><td class="score">${fmtCard(c.c2s,c.c2x)}</td><td class="score">${fmtCard(c.c3s,c.c3x)}</td><td class="score">${fmtTotal300(c)}</td><td class="score">${fmtOpen(c)}</td>${screen.type==="overall"?`<td class="score total">${fmtOverall(c)}</td>`:""}</tr>`}).join("");
 return`<div class="screen-title">${escapeHTML(title)}</div><div class="panel"><table class="${screen.type==="grade"?"grade-table":"full-table"}">${cols}${heads}${rows}</table></div>`}
function leadersHTML(){const rows=[];function top(label,list,s,x,fmtFn){const t=sortBy(list,s,x)[0];if(t)rows.push(`<div class="leader-row"><div class="leader-label">${escapeHTML(label)}</div><div class="leader-name">${escapeHTML(t.name)}</div><div class="leader-score">${fmtFn?fmtFn(t):fmtPlain(t[s],t[x])}</div></div>`)}
 for(const g of VALID_GRADES)top(gradeLabels[g],competitors.filter(c=>c.grade===g),"total300s","total300x",fmtTotal300);top("Open Competition",competitors.filter(c=>c.os||c.ox),"os","ox",fmtOpen);top("Overall Aggregate",competitors.filter(c=>c.overallS||c.overallX),"overallS","overallX",fmtOverall);
 return`<div class="screen-title">Current Leaders</div><div class="panel"><div class="leaders-list">${rows.join("")||'<div class="empty">Load scores.csv to display current leaders</div>'}</div></div>`}
function render(){const screen=screens[idx]||screens[0];if(screen.type==="leaders")document.getElementById("screen").innerHTML=leadersHTML();else if(screen.type==="empty")document.getElementById("screen").innerHTML=`<div class="screen-title">${screen.title}</div><div class="panel"><div class="empty">Load scores.csv to begin</div></div>`;else document.getElementById("screen").innerHTML=tableHTML(screen)}
function startTimer(){clearInterval(timer);timer=setInterval(()=>{idx=(idx+1)%screens.length;render()},ROTATE_MS)}
document.getElementById("file").addEventListener("change",e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{competitors=buildCompetitors(parseCSV(reader.result));buildScreens();render();startTimer();const d=new Date();document.getElementById("updated").textContent=`Updated ${d.toLocaleTimeString()}`};reader.readAsText(file)});
document.getElementById("prev").onclick=()=>{idx=(idx-1+screens.length)%screens.length;render();startTimer()};document.getElementById("next").onclick=()=>{idx=(idx+1)%screens.length;render();startTimer()};document.getElementById("full").onclick=()=>document.documentElement.requestFullscreen?.();document.getElementById("hide").onclick=()=>document.getElementById("controls").classList.add("hidden");
document.addEventListener("keydown",e=>{if(e.key==="ArrowRight"){idx=(idx+1)%screens.length;render();startTimer()}if(e.key==="ArrowLeft"){idx=(idx-1+screens.length)%screens.length;render();startTimer()}if(e.key.toLowerCase()==="h")document.getElementById("controls").classList.toggle("hidden")});
setInterval(()=>document.getElementById("now").textContent=new Date().toLocaleString(),1000);buildScreens();render();startTimer();
</script>
</body>
</html>
